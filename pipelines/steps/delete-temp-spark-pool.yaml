parameters:
  env: ''
  pythonVersion: ''
  poolName: ''

steps:
  - script: |
      set -x
      python${{ parameters.pythonVersion }} --version
      export PYTHONPATH="${PYTHONPATH}:/./"
      python${{ parameters.pythonVersion }} -m pip install "azure-identity==1.21.0"
      python${{ parameters.pythonVersion }} $(System.DefaultWorkingDirectory)/pipelines/scripts/delete_synapse_spark_pool.py -sw "pins-synw-odw-${{ parameters.env }}-uks" -pn ${{ parameters.poolName }}
      ls
      if [ $? -eq 1 ]; then
          echo "##vso[task.logissue type=error]delete_synapse_spark_pool.py failed"
          exit 1
      fi
    displayName: 'Delete Temp Spark Pool'
    name: DeleteTempSparkPool
