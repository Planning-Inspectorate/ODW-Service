parameters:
  env: ''
  pythonVersion: ''
  oldPoolName: ''
  newPoolName: ''

steps:
  - script: |
      set -x
      python${{ parameters.pythonVersion }} --version
      export PYTHONPATH="${PYTHONPATH}:/./"
      python${{ parameters.pythonVersion }} -m pip install "azure-identity==1.21.0"
      python${{ parameters.pythonVersion }} $(System.DefaultWorkingDirectory)/pipelines/scripts/update_spark_pool_references.py -sw "pins-synw-odw-${{ parameters.env }}-uks" -o ${{ parameters.oldPoolName }} -n ${{ parameters.newPoolName }}
      if [ $? -eq 1 ]; then
          echo "##vso[task.logissue type=error]update_spark_pool_references.py failed"
          exit 1
      fi
    displayName: 'Update Spark Pool References'
    name: UpdateSparkPoolReferences
