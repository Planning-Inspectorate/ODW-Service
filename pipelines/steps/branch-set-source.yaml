parameters:
  - name: branchName
    type: string

steps:
  - bash: |
      currentBranch="$(git branch --show-current)"
      echo "current branch via git '${currentBranch}'"
      alternateCurrentBranch="$(git rev-parse --abbrev-ref HEAD)"
      echo "current branch via alternate git command '${alternateCurrentBranch}'"
      echo "source branch $(System.PullRequest.SourceBranch)"
      echo "source branch name $(Build.SourceBranch)"
      echo "PR source branch $(System.PullRequest.SourceBranch)"
      sourceBranch="${{ replace(parameters.branchName, 'refs/heads/', '') }}"
      echo "Exporting current branch name $sourceBranch..."
      echo "##vso[task.setvariable variable=source_branch;isOutput=false]$sourceBranch"
    displayName: 'Set Source Branch'
