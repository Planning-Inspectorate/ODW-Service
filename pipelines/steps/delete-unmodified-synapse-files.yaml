parameters:
  pythonVersion: ''
  targetBranch: env
  fullDeployment: false

##
# Check which services have been modified and need to be redeployed
##
steps:
- script: |
    set -x
    python${{ parameters.pythonVersion }} --version
    export PYTHONPATH="${PYTHONPATH}:/./"
    python${{ parameters.pythonVersion }} $(System.DefaultWorkingDirectory)/pipelines/scripts/delete_unmodified_synapse_files.py --target_branch ${{ parameters.targetBranch }} -fd ${{ parameters.fullDeployment }}
    if [ $? -eq 1 ]; then
        echo "##vso[task.logissue type=error]get_synapse_details.py failed"
        exit 1
    fi
  displayName: 'Delete unmodified files'
  name: DeleteUnmodifiedFiles
