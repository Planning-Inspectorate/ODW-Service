name: Spark pool update

# This pipeline is used to roll out infrastructure updates to spark pools
parameters:
# Environment to deploy to
- name: env
  values:
  - 'dev'
  - 'test'
  - 'prod'
# Whether or not to run tests
- name: runTests
  type: boolean
  default: true
- name: oldPoolName
  type: string
  default: 'pinssynspodw'
- name: newPoolName
  type: string
  default: 'pinssynspodwpr'

variables:
- name: variableGroupName
  ${{ if eq(parameters.env, 'prod') }}:
    value: "Terraform Prod"
  ${{ elseif eq(parameters.env, 'test') }}:
    value: "Terraform Test"
  ${{ else }}:
    value: "Terraform Dev"
- name: agentPool
  value: 'pins-agent-pool-odw-${{ parameters.env }}-uks'
- group: ${{ variables.variableGroupName }}

stages:
- stage: RemoveSparkPoolReferences
  displayName: 'Deploy Synapse to the ${{ parameters.env }} environment'
  condition: succeeded()
  jobs:
  - template: ${{variables['System.DefaultWorkingDirectory']}}/pipelines/jobs/deploy-synapse-with-replaced-pool.yaml
    parameters:
      agentPool: ${{ variables.agentPool }}
      env: ${{ parameters.env }}
      armServiceConnectionName: "ODW ${{ upper(parameters.env) }} - Infrastructure"
      activateTriggers: false
      fullDeployment: false
      oldPoolName: ${{ parameters.oldPoolName }}
      newPoolName: ${{ parameters.newPoolName }}

