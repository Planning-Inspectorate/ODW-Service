name: Spark pool update

# This pipeline is used to roll out infrastructure updates to spark pools
parameters:
# Environment to deploy to
- name: env
  values:
  - 'dev'
  - 'test'
  - 'prod'
# Whether or not to run tests
- name: runTests
  type: boolean
  default: true
- name: oldPoolName
  type: string
  default: 'pinssynspodw'

variables:
- name: variableGroupName
  ${{ if eq(parameters.env, 'prod') }}:
    value: "Terraform Prod"
  ${{ elseif eq(parameters.env, 'test') }}:
    value: "Terraform Test"
  ${{ else }}:
    value: "Terraform Dev"
- name: agentPool
  value: 'pins-agent-pool-odw-${{ parameters.env }}-uks'
- name: newPoolName
  value: adoTmpSparkPool
- group: ${{ variables.variableGroupName }}

stages:
- stage: RemoveSparkPoolReferences
  displayName: 'Deploy Synapse to the ${{ parameters.env }} environment'
  condition: succeeded()
  jobs:
  - template: ${{variables['System.DefaultWorkingDirectory']}}/pipelines/jobs/deploy-synapse-with-replaced-pool.yaml
    parameters:
      agentPool: ${{ variables.agentPool }}
      env: ${{ parameters.env }}
      armServiceConnectionName: "ODW ${{ upper(parameters.env) }} - Infrastructure"
      activateTriggers: false
      fullDeployment: false
      oldPoolName: ${{ parameters.oldPoolName }}
      newPoolName: ${{ variables.newPoolName }}

- stage: DeployInfrastructure
  displayName: 'Deploy Infrastructure to the ${{ parameters.env }} environment'
  condition: succeeded()
  jobs:
  - template: ${{variables['System.DefaultWorkingDirectory']}}/pipelines/jobs/deploy-infrastructure.yaml
    parameters:
      agentPool: ${{ variables.agentPool }}
      env: ${{ parameters.env }}
      armServiceConnectionName: "Azure Devops Pipelines - ODW ${{ upper(parameters.env) }} - Infrastructure"
      failoverDeployment: false
      outputsFileName: "tfoutputs.json"

- stage: RestoreSparkPoolReferences
  displayName: 'Deploy Synapse to the ${{ parameters.env }} environment'
  condition: succeeded()
  jobs:
  - template: ${{variables['System.DefaultWorkingDirectory']}}/pipelines/jobs/deploy-synapse.yaml
    parameters:
      agentPool: ${{ variables.agentPool }}
      env: ${{ parameters.env }}
      armServiceConnectionName: "ODW ${{ upper(parameters.env) }} - Infrastructure"
      activateTriggers: false
      fullDeployment: true

- stage: DeleteTempSparkPool
  displayName: 'Delete the temporary Spark Pool'
  condition: succeeded()
  jobs:
  - job: DeploySynapseJob
    pool: ${{ variables.agentPool }}
    timeoutInMinutes: 0 # Max timeout
    steps:
    # Checkout repo
    - checkout: self
      displayName: 'Checkout'
      persistCredentials: true
      fetchDepth: 0
    # Login to Azure using Terraform service principal
    - template: ${{variables['System.DefaultWorkingDirectory']}}/pipelines/steps/azure-login.yaml
    # Delete the new spark pool
    - template: ${{variables['System.DefaultWorkingDirectory']}}/pipelines/steps/delete-temp-spark-pool.yaml
      parameters:
        env: ${{ parameters.env }}
        pythonVersion: 3
        poolName: ${{ variables.newPoolName }}
