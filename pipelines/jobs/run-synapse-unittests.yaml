parameters:
  agentPool: ''
  env: ''
  runTests: false

##
# Run Synapse unit tests
##
jobs:
- job: RunSynapseUnitTestsJob
  pool: ${{ parameters.agentPool }}
  condition: eq(parameters.runTests, true)
  steps:
  - checkout: self
    clean: true
  - task: AzureCLI@2
    displayName: 'Testing'
    inputs:
      azureSubscription: 'ODW ${{ upper(parameters.env) }} - Infrastructure'
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        echo "testing"