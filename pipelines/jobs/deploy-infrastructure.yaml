parameters:
  agentPool: ''
  env: ''

##
# Deploy Azure Synapse
##
jobs:
- job: Deploy_Synapse
  pool: ${{ parameters.agentPool }}
  condition: eq(stageDependencies.PreDeploy.PreDeploymentChecks.outputs['checkModifiedComponents.infrastructureModified'], true)
  steps:
  - checkout: self
    clean: true
  - task: AzureCLI@2
    displayName: 'Testing'
    inputs:
      azureSubscription: 'ODW ${{ upper(parameters.env) }} - Infrastructure'
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        echo "testing"