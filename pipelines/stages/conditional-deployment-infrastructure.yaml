parameters:
  agentPool: ''
  env: ''

##
# Deploy Infrastructure only if a modification has been detected in the codebase
##
stages:
- stage: Deploy_Infrastructure
  displayName: 'Deploy Infrastructure to the ${{ parameters.env }} environment'
  condition: eq(stageDependencies.PreDeploy.PreDeploymentChecks.outputs['checkModifiedComponents.infrastructureModified'], true)
  dependsOn: PreDeploy
  jobs:
  - template: jobs/deploy-infrastructure.yaml
    parameters:
      agentPool: ${{ parameters.agentPool }}
      env: ${{ parameters.env }}