#This configuration sets up pre-commit hooks for:

#Commit message format using commitlint.
#Python linting with Flake8.
#Python code formatting with Black.
#Branch naming convention enforcement using a custom script (check_branch_name.py).

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v3.4.0
    hooks:
      - id: check-commit-msg
        name: commit-msg-format
        description: "Check commit message format using commit-msg."
        entry: commitlint -e $GIT_PARAMS
        language: node
        types: [commit]

  - repo: https://github.com/pre-commit/mirrors-flake8
    rev: v4.0.1
    hooks:
      - id: flake8
        name: flake8
        description: "Check Python code for style and lint issues."
        entry: flake8
        language: python
        types: [python]

  - repo: https://github.com/psf/black
    rev: 21.12b0
    hooks:
      - id: black
        name: black
        description: "Black Python code formatter."
        language_version: python3
        pass_filenames: false
        types: [python]

  - repo: local
    hooks:
      - id: check-branch-name
        name: check-branch-name
        description: "Check if the branch name follows the convention."
        entry: python3 check_branch_name.py
        language: python
        types: [push]
